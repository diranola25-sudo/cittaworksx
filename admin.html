<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CittaWorksX — Admin Portal</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0f1e;--bg2:#111827;--bg3:#1a2235;--bg4:#243049;--accent:#00d4aa;--text:#e8edf5;--text2:#94a3b8;--text3:#64748b;--border:#1e2d4a;--border2:#2a3d5c;--danger:#ef4444;--success:#22c55e;--warn:#f59e0b;--br:8px;--cr:14px;--font-mono:'Space Mono',monospace;--font-sans:'DM Sans',sans-serif;}
[data-theme="light"]{--bg:#f0f4f8;--bg2:#fff;--bg3:#e8eef5;--bg4:#dde6f0;--text:#0f172a;--text2:#334155;--text3:#64748b;--border:#cbd5e1;--border2:#94a3b8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh;}
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;}
#loading.hidden{display:none;}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.screen{display:none;min-height:100vh;align-items:center;justify-content:center;}
.screen.active{display:flex;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:var(--font-mono);font-size:17px;font-weight:700;display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#0a0f1e;font-weight:700;}
.logo span{color:var(--accent);}
.badge-admin{background:rgba(239,68,68,.15);color:#ef4444;font-size:11px;font-weight:700;padding:.15rem .5rem;border-radius:4px;font-family:var(--font-mono);}
.container{max-width:900px;margin:0 auto;padding:1.5rem 1.25rem;}
.page-title{font-family:var(--font-mono);font-size:20px;font-weight:700;margin-bottom:1.25rem;}.page-title span{color:var(--accent);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--cr);padding:1.25rem;}
.card-title{font-family:var(--font-mono);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:.9rem;}
.btn{border:1.5px solid var(--border2);background:transparent;color:var(--text);padding:.55rem 1.1rem;border-radius:var(--br);cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-sans);transition:all .18s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--bg3);border-color:var(--accent);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#0a0f1e;font-weight:600;}
.btn-primary:hover{background:#00b894;border-color:#00b894;}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff;}
.btn-sm{padding:.35rem .75rem;font-size:13px;}
.form-group{margin-bottom:.9rem;}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:.35rem;}
.form-group input,.form-group select{width:100%;background:var(--bg3);border:1.5px solid var(--border);color:var(--text);padding:.62rem .9rem;border-radius:var(--br);font-size:14px;outline:none;font-family:var(--font-sans);}
.form-group input:focus,.form-group select:focus{border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;}
.alert{padding:.7rem .95rem;border-radius:8px;font-size:13px;margin-bottom:.85rem;}
.alert.hidden{display:none;}
.alert-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;}
.alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#22c55e;}
.alert-info{background:rgba(0,153,255,.1);border:1px solid rgba(0,153,255,.3);color:#0099ff;}
.co-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:.65rem;display:flex;align-items:center;gap:12px;}
.co-avatar{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:17px;flex-shrink:0;}
.theme-toggle{width:48px;height:26px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:13px;position:relative;cursor:pointer;flex-shrink:0;}
.theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:var(--accent);border-radius:50%;transition:left .25s;}
[data-theme="light"] .theme-toggle::after{left:25px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.hidden{display:none;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:1.75rem;margin:1rem;}
.modal-title{font-family:var(--font-mono);font-size:16px;font-weight:700;margin-bottom:1.25rem;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem;}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.9rem;}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:.3rem;}
.stat-val{font-family:var(--font-mono);font-size:17px;font-weight:700;}
.stat-val.accent{color:var(--accent);}
</style>
</head>
<body>

<div id="loading">
  <div style="width:52px;height:52px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:24px;color:#0a0f1e;">C</div>
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--text3);" id="loading-msg">Connecting…</div>
</div>

<!-- LOGIN -->
<div class="screen active" id="admin-login-screen">
  <div style="width:100%;max-width:420px;padding:1.5rem;">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="width:64px;height:64px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:28px;color:#0a0f1e;margin:0 auto 12px;">C</div>
      <h1 style="font-family:var(--font-mono);font-size:22px;font-weight:700;">Citta<span style="color:var(--accent);">Works</span>X</h1>
      <p style="color:var(--text3);font-size:13px;margin-top:4px;">Admin Portal</p>
    </div>
    <div class="card">
      <div id="admin-login-alert" class="alert hidden"></div>
      <div class="form-group"><label>Admin Email</label><input type="email" id="adm-email" placeholder="admin@example.com" autocomplete="username"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="adm-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdminLogin()"/></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem;" onclick="doAdminLogin()">Sign In</button>
      <div style="text-align:center;margin-top:1rem;">
        <button class="theme-toggle" onclick="toggleTheme()"></button>
      </div>
      <div style="margin-top:1.25rem;padding:.85rem;background:var(--bg3);border-radius:8px;font-size:12px;color:var(--text3);line-height:1.6;">
        <strong style="color:var(--text2);">First time setup?</strong><br>
        Default: <code style="color:var(--accent);">admin@cittaworksx.com</code> / <code style="color:var(--accent);">Admin@123</code><br>
        <span style="color:var(--warn);">Change password after first login.</span>
      </div>
    </div>
  </div>
</div>

<!-- MAIN ADMIN -->
<div class="screen" id="admin-main-screen" style="flex-direction:column;align-items:stretch;background:var(--bg);">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">C</div>
      Citta<span>Works</span>X
      <span class="badge-admin">ADMIN</span>
    </div>
    <div style="display:flex;align-items:center;gap:.75rem;">
      <button class="theme-toggle" onclick="toggleTheme()"></button>
      <button class="btn btn-sm btn-danger" onclick="doAdminLogout()">Log Out</button>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;">
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
        <div class="page-title" style="margin:0;">Company <span>Management</span></div>
        <button class="btn btn-primary" onclick="openAddCompanyModal()">+ Add Company</button>
      </div>
      <div class="stat-grid" id="admin-stats">
        <div class="stat-card"><div class="stat-label">Companies</div><div class="stat-val accent" id="stat-cos">—</div></div>
        <div class="stat-card"><div class="stat-label">Total Staff</div><div class="stat-val" id="stat-staff">—</div></div>
        <div class="stat-card"><div class="stat-label">Logs Today</div><div class="stat-val" id="stat-logs">—</div></div>
      </div>
      <div id="co-list-container"></div>
      <div style="margin-top:2rem;" id="admin-users-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
          <div class="card-title" style="margin:0;">Admin Users</div>
          <button class="btn btn-sm" onclick="openAddAdminModal()">+ Add Admin</button>
        </div>
        <div id="admin-users-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- Add Company Modal -->
<div class="modal-overlay hidden" id="modal-add-company">
  <div class="modal">
    <div class="modal-title" id="co-modal-title">Register New Company</div>
    <div id="co-form-alert" class="alert hidden"></div>
    <div class="form-row">
      <div class="form-group"><label>Company Name *</label><input type="text" id="cf-name"/></div>
      <div class="form-group"><label>Industry</label><input type="text" id="cf-industry" placeholder="e.g. Consulting"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Country</label><input type="text" id="cf-country" placeholder="e.g. Nigeria"/></div>
      <div class="form-group"><label>Contact Person</label><input type="text" id="cf-contact"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Official Email</label><input type="email" id="cf-email"/></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="cf-phone"/></div>
    </div>
    <div class="form-group"><label>Address</label><input type="text" id="cf-address"/></div>
    <div class="form-row">
      <div class="form-group"><label>Brand Color</label><input type="color" id="cf-color" value="#00d4aa"/></div>
      <div class="form-group"><label>Text Color</label><input type="color" id="cf-tcolor" value="#0a0f1e"/></div>
    </div>
    <div style="display:flex;gap:.75rem;margin-top:.5rem;">
      <button class="btn" style="flex:1;justify-content:center;" onclick="closeModal('modal-add-company')">Cancel</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="saveCompany()">Save Company</button>
    </div>
  </div>
</div>

<!-- Company Detail Modal -->
<div class="modal-overlay hidden" id="modal-co-detail">
  <div class="modal">
    <div id="co-detail-content"></div>
    <button class="btn" style="width:100%;justify-content:center;margin-top:1rem;" onclick="closeModal('modal-co-detail')">Close</button>
  </div>
</div>

<!-- Add Admin User Modal -->
<div class="modal-overlay hidden" id="modal-add-admin">
  <div class="modal">
    <div class="modal-title">Add Admin User</div>
    <div id="admin-user-alert" class="alert hidden"></div>
    <div class="form-row">
      <div class="form-group"><label>Name *</label><input type="text" id="au-name"/></div>
      <div class="form-group"><label>Email *</label><input type="email" id="au-email"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Password *</label><input type="password" id="au-pw"/></div>
      <div class="form-group"><label>Role</label>
        <select id="au-role"><option value="admin">Admin</option><option value="superadmin">Super Admin</option></select>
      </div>
    </div>
    <div style="display:flex;gap:.75rem;">
      <button class="btn" style="flex:1;justify-content:center;" onclick="closeModal('modal-add-admin')">Cancel</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="saveAdminUser()">Save</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  FIREBASE CONFIG — Same as index.html — Replace with yours
// ============================================================
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDFPk32nsqNcss2kV_p1uj-AeWDQa4GHAA",
  authDomain:        "cittaworksx.firebaseapp.com",
  projectId:         "cittaworksx",
  storageBucket:     "cittaworksx.appspot.com",
  messagingSenderId: "745110696175",
  appId:             "1:745110696175:web:e7a92250e2f3799146ab1a"
};

let _db = null;

function _initFirebase() {
  if (typeof firebase === 'undefined') {
    throw new Error('Firebase SDK did not load. Check your internet connection.');
  }
  if (FIREBASE_CONFIG.apiKey === 'AIzaSyDFPk32nsqNcss2kV_p1uj-AeWDQa4GHAA') {
    throw new Error('Firebase config not set. Open admin.html in a text editor and replace AIzaSyDFPk32nsqNcss2kV_p1uj-AeWDQa4GHAA, cittaworksx etc. with your real Firebase config values.');
  }
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  _db = firebase.firestore();
  _db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
}

try {
  _initFirebase();
} catch(e) {
  console.error('Firebase init:', e);
  // Show error on page after DOM loads
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('loading').classList.add('hidden');
    const alertEl = document.getElementById('admin-login-alert');
    if (alertEl) {
      alertEl.className = 'alert alert-danger';
      alertEl.style.display = 'block';
      alertEl.innerHTML = '<strong>Setup Required</strong><br>' + e.message;
    }
  });
}

const _list = async r => { const s=await r.get(); return s.docs.map(d=>({id:d.id,...d.data()})); };
const _get  = async r => { const s=await r.get(); return s.exists?{id:s.id,...s.data()}:null; };

// ============================================================
//  ADMIN AUTH — Stored in Firestore adminUsers collection
//  Default admin seeded on first run
// ============================================================
let adminUser = null;
let _editingCompanyId = null;

function showLoading(msg='Loading…'){
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('loading-msg').textContent=msg;
}
function hideLoading(){ document.getElementById('loading').classList.add('hidden'); }
function showModal(id){ document.getElementById(id).classList.remove('hidden'); }
function closeModal(id){ document.getElementById(id).classList.add('hidden'); }
function showAlert(id,msg,type){ const el=document.getElementById(id);if(!el)return;el.className='alert alert-'+type;el.textContent=msg; }
function hideAlert(id){ const el=document.getElementById(id);if(el)el.classList.add('hidden'); }
function v(id){ return (document.getElementById(id)||{}).value||''; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toggleTheme(){ const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',t); localStorage.setItem('cwx_theme',t); }
(()=>{ const t=localStorage.getItem('cwx_theme'); if(t)document.documentElement.setAttribute('data-theme',t); })();

// Seed default admin on first load
async function seedDefaultAdmin(){
  if(!_db)return;
  try{
    const existing = await _db.collection('adminUsers').where('email','==','admin@cittaworksx.com').limit(1).get();
    if(existing.empty){
      await _db.collection('adminUsers').add({name:'System Admin',email:'admin@cittaworksx.com',password:'Admin@123',role:'superadmin',createdAt:new Date().toISOString()});
      console.log('Default admin seeded');
    }
  }catch(e){ console.error('Seed error:',e); }
}

window.addEventListener('load', async ()=>{
  // Check if Firebase config was filled in
  if(!_db || FIREBASE_CONFIG.apiKey === 'AIzaSyDFPk32nsqNcss2kV_p1uj-AeWDQa4GHAA'){
    hideLoading();
    const alertEl = document.getElementById('admin-login-alert');
    alertEl.className = 'alert alert-danger';
    alertEl.style.display = 'block';
    alertEl.innerHTML = `<strong>Firebase Setup Required</strong><br>
      Open <strong>admin.html</strong> in a text editor and replace the 6 placeholder values in FIREBASE_CONFIG with your real Firebase project values.<br><br>
      <a href="https://console.firebase.google.com" target="_blank" style="color:var(--accent);">
        Open Firebase Console →
      </a>`;
    return;
  }
  showLoading('Connecting…');
  try{
    await seedDefaultAdmin();
    hideLoading();
  }catch(e){
    hideLoading();
    const alertEl = document.getElementById('admin-login-alert');
    alertEl.className = 'alert alert-danger';
    alertEl.style.display = 'block';
    alertEl.textContent = 'Firebase error: ' + e.message;
  }
});

async function doAdminLogin(){
  const email=v('adm-email').trim();
  const pw=v('adm-pw');
  if(!email||!pw){showAlert('admin-login-alert','Enter email and password.','danger');return;}
  showLoading('Signing in…');
  try{
    const snap=await _db.collection('adminUsers').where('email','==',email).where('password','==',pw).limit(1).get();
    if(snap.empty){hideLoading();showAlert('admin-login-alert','Invalid email or password.','danger');return;}
    adminUser={id:snap.docs[0].id,...snap.docs[0].data()};
    hideLoading();
    showScreen('admin-main-screen');
    loadDashboard();
  }catch(e){hideLoading();showAlert('admin-login-alert','Error: '+e.message,'danger');}
}

function doAdminLogout(){
  adminUser=null;
  showScreen('admin-login-screen');
  document.getElementById('adm-email').value='';
  document.getElementById('adm-pw').value='';
  hideAlert('admin-login-alert');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function loadDashboard(){
  showLoading('Loading companies…');
  try{
    const companies = await _list(_db.collection('companies'));
    hideLoading();
    // Stats
    document.getElementById('stat-cos').textContent=companies.length;
    // Count staff across all companies (parallel)
    let totalStaff=0, totalLogs=0;
    const today=new Date().toISOString().split('T')[0];
    await Promise.all(companies.map(async co=>{
      const staffSnap=await _db.collection('companies').doc(co.id).collection('staff').get();
      totalStaff+=staffSnap.size;
      const logsSnap=await _db.collection('companies').doc(co.id).collection('logs').where('date','==',today).get();
      totalLogs+=logsSnap.size;
    }));
    document.getElementById('stat-staff').textContent=totalStaff;
    document.getElementById('stat-logs').textContent=totalLogs;
    renderCompanyList(companies);
    loadAdminUsers();
  }catch(e){
    hideLoading();
    document.getElementById('co-list-container').innerHTML='<div style="color:var(--danger);padding:1rem;">Error: '+esc(e.message)+'<br><small>Check Firebase config and Firestore rules.</small></div>';
  }
}

function renderCompanyList(companies){
  const c=document.getElementById('co-list-container');
  if(!companies.length){
    c.innerHTML='<div style="text-align:center;padding:2rem;color:var(--text3);">No companies registered yet. Click <strong>+ Add Company</strong> to get started.</div>';
    return;
  }
  c.innerHTML=companies.map(co=>{
    const bg=co.color||'rgba(0,212,170,.15)';
    const tc=co.textColor||'#00d4aa';
    const l=(co.name||'?').charAt(0).toUpperCase();
    return `<div class="co-card">
      <div class="co-avatar" style="background:${bg};color:${tc};">${l}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:15px;">${esc(co.name)}</div>
        <div style="font-size:12px;color:var(--text3);">${esc(co.industry||'')}${co.country?' · '+esc(co.country):''}</div>
        ${co.email?`<div style="font-size:12px;color:var(--text3);">${esc(co.email)}</div>`:''}
      </div>
      <div style="display:flex;gap:.5rem;">
        <button class="btn btn-sm" onclick="showCompanyDetail('${co.id}')">View</button>
        <button class="btn btn-sm" onclick="openEditCompany('${co.id}')">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteCompany('${co.id}','${esc(co.name)}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

async function showCompanyDetail(coId){
  showLoading('Loading…');
  try{
    const co=await _get(_db.collection('companies').doc(coId));
    const staff=await _list(_db.collection('companies').doc(coId).collection('staff'));
    const today=new Date().toISOString().split('T')[0];
    const todayLogs=await _list(_db.collection('companies').doc(coId).collection('logs').where('date','==',today));
    hideLoading();
    const bg=co.color||'rgba(0,212,170,.15)';
    const tc=co.textColor||'#00d4aa';
    document.getElementById('co-detail-content').innerHTML=`
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;">
        <div style="width:52px;height:52px;border-radius:12px;background:${bg};display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:20px;color:${tc};">${(co.name||'?').charAt(0).toUpperCase()}</div>
        <div><div style="font-size:18px;font-weight:700;">${esc(co.name)}</div><div style="font-size:13px;color:var(--text3);">${esc(co.industry||'')}${co.country?' · '+esc(co.country):''}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.65rem;margin-bottom:1.1rem;">
        <div class="stat-card"><div class="stat-label">Staff</div><div class="stat-val">${staff.length}</div></div>
        <div class="stat-card"><div class="stat-label">Managers</div><div class="stat-val">${staff.filter(s=>s.systemRole==='manager').length}</div></div>
        <div class="stat-card"><div class="stat-label">Today's Logs</div><div class="stat-val accent">${todayLogs.length}</div></div>
      </div>
      ${co.address?`<div style="font-size:13px;color:var(--text2);margin-bottom:.3rem;">📍 ${esc(co.address)}</div>`:''}
      ${co.email?`<div style="font-size:13px;color:var(--text2);margin-bottom:.3rem;">📧 ${esc(co.email)}</div>`:''}
      ${co.phone?`<div style="font-size:13px;color:var(--text2);margin-bottom:.3rem;">📱 ${esc(co.phone)}</div>`:''}
      ${co.contactPerson?`<div style="font-size:13px;color:var(--text2);margin-bottom:.75rem;">👤 ${esc(co.contactPerson)}</div>`:''}
      <div class="card-title">Registered Staff</div>
      ${staff.length?staff.map(s=>`
        <div style="display:flex;align-items:center;gap:10px;padding:.55rem .75rem;background:var(--bg3);border-radius:8px;margin-bottom:.35rem;">
          <div style="width:32px;height:32px;border-radius:8px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--accent);">${(s.name||'?').substring(0,2).toUpperCase()}</div>
          <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${esc(s.name||s.staffId)}</div><div style="font-size:11px;color:var(--text3);">${esc(s.staffId||'')} · ${esc(s.role||'')} · ${esc(s.department||'')}</div></div>
          <span style="font-size:11px;padding:.15rem .45rem;border-radius:4px;background:${s.systemRole==='manager'?'rgba(245,158,11,.15)':'rgba(0,153,255,.15)'};color:${s.systemRole==='manager'?'#f59e0b':'#0099ff'};">${s.systemRole==='manager'?'Manager':'Staff'}</span>
        </div>`).join(''):'<p style="color:var(--text3);font-size:13px;">No staff registered.</p>'}`;
    showModal('modal-co-detail');
  }catch(e){hideLoading();alert('Error: '+e.message);}
}

function openAddCompanyModal(){
  _editingCompanyId=null;
  document.getElementById('co-modal-title').textContent='Register New Company';
  ['cf-name','cf-industry','cf-country','cf-contact','cf-email','cf-phone','cf-address'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('cf-color').value='#00d4aa';
  document.getElementById('cf-tcolor').value='#0a0f1e';
  hideAlert('co-form-alert');
  showModal('modal-add-company');
}

async function openEditCompany(coId){
  showLoading('Loading…');
  try{
    const co=await _get(_db.collection('companies').doc(coId));
    hideLoading();
    _editingCompanyId=coId;
    document.getElementById('co-modal-title').textContent='Edit Company';
    document.getElementById('cf-name').value=co.name||'';
    document.getElementById('cf-industry').value=co.industry||'';
    document.getElementById('cf-country').value=co.country||'';
    document.getElementById('cf-contact').value=co.contactPerson||'';
    document.getElementById('cf-email').value=co.email||'';
    document.getElementById('cf-phone').value=co.phone||'';
    document.getElementById('cf-address').value=co.address||'';
    document.getElementById('cf-color').value=co.color||'#00d4aa';
    document.getElementById('cf-tcolor').value=co.textColor||'#0a0f1e';
    hideAlert('co-form-alert');
    showModal('modal-add-company');
  }catch(e){hideLoading();alert('Error: '+e.message);}
}

async function saveCompany(){
  const name=v('cf-name');
  if(!name){showAlert('co-form-alert','Company name is required.','danger');return;}
  showLoading('Saving…');
  try{
    const data={
      name,industry:v('cf-industry'),country:v('cf-country'),
      contactPerson:v('cf-contact'),email:v('cf-email'),phone:v('cf-phone'),
      address:v('cf-address'),color:v('cf-color'),textColor:v('cf-tcolor'),
      updatedAt:new Date().toISOString()
    };
    if(_editingCompanyId){
      await _db.collection('companies').doc(_editingCompanyId).update(data);
    } else {
      data.createdAt=new Date().toISOString();
      await _db.collection('companies').add(data);
    }
    hideLoading();closeModal('modal-add-company');loadDashboard();
  }catch(e){hideLoading();showAlert('co-form-alert','Error: '+e.message,'danger');}
}

async function deleteCompany(coId, name){
  if(!confirm(`Delete "${name}"? This will permanently remove the company and ALL staff and logs. This cannot be undone.`))return;
  showLoading('Deleting…');
  try{
    // Delete sub-collections
    const cols=['staff','logs','settings','kpiCategories','kpiDefinitions','kpiTargets','kpiAppraisals','kpiApprovals','kpiAudit'];
    for(const col of cols){
      const snap=await _db.collection('companies').doc(coId).collection(col).get();
      const batch=_db.batch();
      snap.docs.forEach(d=>batch.delete(d.ref));
      if(snap.size>0)await batch.commit();
    }
    await _db.collection('companies').doc(coId).delete();
    hideLoading();loadDashboard();
  }catch(e){hideLoading();alert('Delete error: '+e.message);}
}

async function loadAdminUsers(){
  try{
    const users=await _list(_db.collection('adminUsers'));
    document.getElementById('admin-users-list').innerHTML=users.map(u=>`
      <div style="display:flex;align-items:center;gap:12px;padding:.75rem;background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-bottom:.5rem;">
        <div style="flex:1;"><div style="font-weight:600;font-size:14px;">${esc(u.name||u.email)}</div><div style="font-size:12px;color:var(--text3);">${esc(u.email)} · ${esc(u.role||'admin')}</div></div>
        ${adminUser&&adminUser.id!==u.id?`<button class="btn btn-sm btn-danger" onclick="deleteAdminUser('${u.id}','${esc(u.email)}')">Remove</button>`:'<span style="font-size:12px;color:var(--accent);">You</span>'}
      </div>`).join('')||'<p style="color:var(--text3);">No admin users.</p>';
  }catch(e){console.error('Load admins:',e);}
}

function openAddAdminModal(){
  ['au-name','au-email','au-pw'].forEach(id=>document.getElementById(id).value='');
  hideAlert('admin-user-alert');showModal('modal-add-admin');
}

async function saveAdminUser(){
  const name=v('au-name'),email=v('au-email'),pw=v('au-pw'),role=v('au-role');
  if(!name||!email||!pw){showAlert('admin-user-alert','All fields required.','danger');return;}
  if(pw.length<6){showAlert('admin-user-alert','Password min 6 chars.','danger');return;}
  showLoading('Saving…');
  try{
    const exists=await _db.collection('adminUsers').where('email','==',email).limit(1).get();
    if(!exists.empty){hideLoading();showAlert('admin-user-alert','Email already in use.','danger');return;}
    await _db.collection('adminUsers').add({name,email,password:pw,role,createdAt:new Date().toISOString()});
    hideLoading();closeModal('modal-add-admin');loadAdminUsers();
  }catch(e){hideLoading();showAlert('admin-user-alert','Error: '+e.message,'danger');}
}

async function deleteAdminUser(id,email){
  if(!confirm('Remove admin: '+email+'?'))return;
  showLoading('Removing…');
  await _db.collection('adminUsers').doc(id).delete();
  hideLoading();loadAdminUsers();
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.add('hidden');});
});
</script>
